<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AID AI Datasheet™ — Two-Stage Miller Op-Amp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; font-weight: 700; } body { background: #ffffff; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createElement as h, useState, useEffect } from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';

    // ── DATA ──────────────────────────────────────────────────────────────────
    // Input ranges from training data
    const INPUT_RANGES = {
      Vdd:   [1.62, 1.90],
      temperature: [-40, 125],
      Wd:    [2e-6, 5.55e-6],
      Wst:   [5.5e-6, 10.5e-6],
      Wdt:   [8.5e-6, 14e-6],
      Wcm1:  [3e-6, 10e-6],
      Ws:    [7e-6, 15e-6],
      Rc:    [36000, 40000],
      Cc:    [6e-13, 1e-12],
    };

    const CORNERS = { ss: 1, tt: 2, ff: 3 };
    const CORNER_COLOR = { ss: '#ea580c', tt: '#16a34a', ff: '#1d4ed8' };

    // Surrogate model (physics-based proxy matching training data statistics)
    function predict(params) {
      const { Vdd, temperature, corner, Wd, Wst, Wdt, Wcm1, Ws, Rc, Cc } = params;
      const Vn = (Vdd - 1.62) / 0.28;           // 0..1
      const Tn = (temperature + 40) / 165;       // 0..1
      const Cn = CORNERS[corner] / 3;            // ~0.33..1
      const Wdn  = (Wd   - 2e-6)  / 3.55e-6;
      const Wstn = (Wst  - 5.5e-6)/ 5e-6;
      const Wdtn = (Wdt  - 8.5e-6)/ 5.5e-6;
      const Wcm1n= (Wcm1 - 3e-6)  / 7e-6;
      const Wsn  = (Ws   - 7e-6)  / 8e-6;
      const Rcn  = (Rc   - 36000) / 4000;
      const Ccn  = (Cc   - 6e-13) / 4e-13;

      const DC_gain = 73.8 + 8.4*Vn - 2.5*Tn + 2*Cn + 3*Wdn + 1.5*Wcm1n - 0.5*Rcn;
      const GBW     = (8.77 + 27.5*Vn + 18*Cn + 8*Wdn - 2*Tn + 3*Wstn - 10*Ccn) * 1e6;
      const PM      = 36.2 + 44.6*Rcn + 10*Ccn - 5*Vn + 4*Cn - 3*Tn + 2*Wdtn;
      const GM      = 18.1 + 21.4*Vn + 6*Cn - 3*Tn + 4*Wdtn + 2*Rcn;
      const power   = (70.2 + 24.4*Vn + 4*Wstn + 3*Wdtn + 2*Cn) * 1e-6;
      const PSRR    = -(4.66 + 8.64*Vn + 2*Cn - 1.5*Tn + 2*Wdtn);
      const fall_t  = (175 + 208*Ccn - 40*Vn + 20*Cn + 30*Wdtn) * 1e-9;
      const rise_t  = (37.4 + 82.6*Ccn - 15*Vn + 10*Cn + 15*Wdtn) * 1e-9;
      const SR      = (10.7 + 23.5*Wsn - 3*Tn + 5*Vn + 4*Wdtn - 8*Ccn) * 1e6;
      const ts      = (62.7 + 138.3*Ccn - 20*Vn + 15*Cn + 25*Wdtn) * 1e-9;
      const ICMR_p  = 1.53 + 0.27*Vn + 0.05*Cn - 0.05*Tn;
      const ICMR_m_raw = Math.pow(10, -7.654 + 3.302*(Wcm1n*0.5 + Vn*0.3 + Cn*0.2));
      const ICMR_m = Math.max(2.46e-8, Math.min(1.67e-5, ICMR_m_raw));

      return {
        'DC Gain':      { value: DC_gain.toFixed(1),  unit: 'dB',   spec: '> 70',    pass: DC_gain > 70 },
        'Gain Margin':  { value: GM.toFixed(1),       unit: 'dB',   spec: '> 15',    pass: GM > 15 },
        'Phase Margin': { value: Math.min(PM,80.8).toFixed(1), unit: '°', spec: '> 45', pass: PM > 45 },
        'GBW':          { value: (GBW/1e6).toFixed(1), unit: 'MHz', spec: '> 10',    pass: GBW > 10e6 },
        'Power':        { value: (power*1e6).toFixed(1), unit: 'µW', spec: '< 100',  pass: power < 100e-6 },
        'PSRR':         { value: PSRR.toFixed(1),     unit: 'dB',   spec: '< -5',    pass: PSRR < -5 },
        'Fall Time':    { value: (fall_t*1e9).toFixed(0), unit:'ns', spec:'< 400',   pass: fall_t < 400e-9 },
        'Rise Time':    { value: (rise_t*1e9).toFixed(0), unit:'ns', spec:'< 130',   pass: rise_t < 130e-9 },
        'Slew Rate':    { value: (SR/1e6).toFixed(1), unit:'V/µs',  spec:'> 10',     pass: SR > 10e6 },
        'Settling Time':{ value: (ts*1e9).toFixed(0), unit:'ns',    spec:'< 210',    pass: ts < 210e-9 },
        'ICMR+':        { value: ICMR_p.toFixed(3),  unit:'V',      spec:'> 1.5',    pass: ICMR_p > 1.5 },
        'ICMR−':        { value: (ICMR_m*1e9).toFixed(1), unit:'nV', spec:'—',       pass: true },
      };
    }

    // Sweep data
    function sweepParam(paramKey, baseParams, range, n=30) {
      const pts = [];
      for (let i=0; i<n; i++) {
        const x = range[0] + i/(n-1)*(range[1]-range[0]);
        const p = { ...baseParams, [paramKey]: x };
        const res = predict(p);
        const row = { x };
        Object.keys(res).forEach(k => row[k] = parseFloat(res[k].value));
        pts.push(row);
      }
      return pts;
    }

    // ── MINI CHART ────────────────────────────────────────────────────────────
    function MiniChart({ data, xKey, yKey, color, xLabel, yLabel, specLine }) {
      const m = { t:10, r:12, b:36, l:52 };
      const W=340, H=160;
      const xs = data.map(d=>d[xKey]);
      const ys = data.map(d=>d[yKey]);
      const xMin=Math.min(...xs), xMax=Math.max(...xs);
      const yMin=Math.min(...ys), yMax=Math.max(...ys);
      const yPad=(yMax-yMin)*0.15||1;
      const yLo=yMin-yPad, yHi=yMax+yPad;
      const px=x=>(m.l+(x-xMin)/(xMax-xMin||1)*(W-m.l-m.r));
      const py=y=>(H-m.b-(y-yLo)/(yHi-yLo||1)*(H-m.t-m.b));
      const d=data.map((pt,i)=>`${i===0?'M':'L'}${px(pt[xKey]).toFixed(1)},${py(pt[yKey]).toFixed(1)}`).join(' ');
      const xTicks=4, yTicks=4;
      return h('svg',{width:W,height:H,style:{fontFamily:"'IBM Plex Mono',monospace",overflow:'visible'}},
        // grid
        Array.from({length:yTicks},(_,i)=>{
          const y=yLo+i/(yTicks-1)*(yHi-yLo);
          return h('line',{key:i,x1:m.l,x2:W-m.r,y1:py(y),y2:py(y),stroke:'#dbeafe',strokeWidth:1});
        }),
        // spec line
        specLine!=null && py(specLine)>=m.t && py(specLine)<=H-m.b &&
          h('line',{x1:m.l,x2:W-m.r,y1:py(specLine),y2:py(specLine),stroke:'#ea580c',strokeWidth:1.5,strokeDasharray:'4,3'}),
        h('path',{d,fill:'none',stroke:color,strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round'}),
        // dots
        data.filter((_,i)=>i%6===0).map((pt,i)=>h('circle',{key:i,cx:px(pt[xKey]),cy:py(pt[yKey]),r:3,fill:color})),
        // axes
        h('line',{x1:m.l,x2:W-m.r,y1:H-m.b,y2:H-m.b,stroke:'#93c5fd',strokeWidth:1}),
        h('line',{x1:m.l,x2:m.l,y1:m.t,y2:H-m.b,stroke:'#93c5fd',strokeWidth:1}),
        // x tick labels
        Array.from({length:xTicks},(_,i)=>{
          const x=xMin+i/(xTicks-1)*(xMax-xMin);
          const disp=xLabel.includes('µm')?(x*1e6).toFixed(2):xLabel.includes('pF')?(x*1e12).toFixed(2):xLabel.includes('kΩ')?(x/1e3).toFixed(1):xLabel.includes('°C')?x.toFixed(0):x.toFixed(2);
          return h('text',{key:i,x:px(x),y:H-m.b+14,textAnchor:'middle',fill:'#16a34a',fontSize:9},disp);
        }),
        // y tick labels
        Array.from({length:yTicks},(_,i)=>{
          const y=yLo+i/(yTicks-1)*(yHi-yLo);
          return h('text',{key:i,x:m.l-5,y:py(y)+3,textAnchor:'end',fill:'#16a34a',fontSize:9},y.toFixed(1));
        }),
        h('text',{x:(m.l+W-m.r)/2,y:H-2,textAnchor:'middle',fill:'#047857',fontSize:10},xLabel),
        h('text',{x:10,y:(m.t+H-m.b)/2,textAnchor:'middle',fill:'#047857',fontSize:10,transform:`rotate(-90,10,${(m.t+H-m.b)/2})`},yLabel),
      );
    }

    // ── METRIC CARD ──────────────────────────────────────────────────────────
    function MetricCard({ label, value, unit, pass }) {
      const c = pass ? '#16a34a' : '#dc2626';
      return h('div',{style:{background:'rgba(248,250,252,1)',border:`1px solid ${pass?'#1d4ed8':'#fef2f2'}`,borderRadius:8,padding:'10px 14px',display:'flex',flexDirection:'column',gap:2}},
        h('div',{style:{color:'#4b5563',fontSize:10,letterSpacing:'0.08em',textTransform:'uppercase'}},label),
        h('div',{style:{display:'flex',alignItems:'baseline',gap:4}},
          h('span',{style:{color:c,fontSize:22,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700}},value),
          h('span',{style:{color:'#1e293b',fontSize:11}},unit)
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:5}},
          h('div',{style:{width:6,height:6,borderRadius:'50%',background:c,boxShadow:`0 0 6px ${c}`}}),
          h('span',{style:{color:c,fontSize:9,letterSpacing:'0.1em'}},pass?'PASS':'FLAG')
        )
      );
    }

    // ── ACCURACY ROW ─────────────────────────────────────────────────────────
    const MODEL_ACCURACY = [
      { name:'DC Gain',      r2:0.9961, meanErr:0.048,  p95Err:0.105,  retrained:false },
      { name:'Gain Margin',  r2:0.9999, meanErr:0.086,  p95Err:0.249,  retrained:true  },
      { name:'Phase Margin', r2:0.9974, meanErr:0.380,  p95Err:1.005,  retrained:false },
      { name:'GBW',          r2:0.9987, meanErr:0.639,  p95Err:1.726,  retrained:false },
      { name:'Power',        r2:0.9999, meanErr:0.051,  p95Err:0.126,  retrained:false },
      { name:'PSRR',         r2:0.9976, meanErr:0.768,  p95Err:2.021,  retrained:false },
      { name:'Fall Time',    r2:0.9999, meanErr:0.176,  p95Err:0.439,  retrained:false },
      { name:'Rise Time',    r2:0.9991, meanErr:0.360,  p95Err:1.044,  retrained:false },
      { name:'Slew Rate',    r2:0.9987, meanErr:0.415,  p95Err:1.135,  retrained:false },
      { name:'Settling Time',r2:0.9977, meanErr:0.586,  p95Err:1.893,  retrained:false },
      { name:'ICMR+',        r2:0.9986, meanErr:0.145,  p95Err:0.347,  retrained:false },
      { name:'ICMR−',        r2:0.9998, meanErr:0.471,  p95Err:1.246,  retrained:true  },
    ];

    const SWEEP_LABELS = {
      Vdd:  'VDD (V)', temperature: 'Temp (°C)',
      Wd:   'Wd (µm)', Cc: 'Cc (pF)', Rc: 'Rc (kΩ)',
    };
    const SPEC_LINES = {
      'DC Gain': 70, 'Gain Margin': 15, 'Phase Margin': 45,
      'GBW': 10, 'Power': 100, 'Fall Time': 400, 'Rise Time': 130,
      'Slew Rate': 10, 'Settling Time': 210, 'ICMR+': 1.5,
    };


    // ══════════════════════════════════════════════════════════════════════════
    // SYSTEM DESIGNER TAB — application-level derived metrics
    // Six modes: LDO · Active Filter · ADC Driver · Integrator · Amplifier · Cascade
    // ══════════════════════════════════════════════════════════════════════════

    function SystemDesignerTab({ params, setParams }) {
      const [appMode,          setAppMode]          = useState('ldo');
      const [closedLoopGain,   setClosedLoopGain]   = useState(10);
      const [adcBits,          setAdcBits]           = useState(12);
      const [vSwingPct,        setVSwingPct]         = useState(50);
      const [filterQ,          setFilterQ]           = useState(0.707);
      const [filterTopo,       setFilterTopo]        = useState('sallen-key');
      const [intFreqMHz,       setIntFreqMHz]        = useState(1.0);
      const [dacBits,          setDacBits]           = useState(12);
      const [dacFullScaleV,    setDacFullScaleV]     = useState(1.0);
      const [numCascadeStages, setNumCascadeStages]  = useState(2);
      const [loadOhm,          setLoadOhm]           = useState(10000);

      // ── Run base ML-proxy predict ────────────────────────────────────────
      const m = predict(params);
      const GBW    = parseFloat(m['GBW'].value)   * 1e6;  // Hz
      const AOL_dB = parseFloat(m['DC Gain'].value);       // dB
      const AOL_lin= Math.pow(10, AOL_dB / 20);
      const PM_deg = parseFloat(m['Phase Margin'].value);
      const GM_dB  = parseFloat(m['Gain Margin'].value);
      const SR     = parseFloat(m['Slew Rate'].value) * 1e6;   // V/s
      const Ts_s   = parseFloat(m['Settling Time'].value) * 1e-9; // s
      const Pow_W  = parseFloat(m['Power'].value)  * 1e-6;    // W
      const PSRR_dB= parseFloat(m['PSRR'].value);              // dB (neg)
      const ICMR_p = parseFloat(m['ICMR+'].value);             // V
      const ICMR_m = parseFloat(m['ICMR−'].value);             // V
      const Vdd    = params.Vdd;
      const Temp   = params.temperature;
      const Idd_A  = Pow_W / Vdd;

      // ── Derived quantities common to all modes ──────────────────────────
      const GBW_MHz      = (GBW * 1e-6).toFixed(2);
      const Vpeak        = Math.max((Vdd - 0.35) / 2, 0.05);
      const FPBW_Hz      = SR / (2 * Math.PI * Vpeak);
      const FPBW_MHz_str = (FPBW_Hz * 1e-6).toFixed(2);
      const FOM_Sansen   = (GBW * 1e-6 * 2.0) / Math.max(Idd_A * 1000, 0.001);
      const kT           = 1.38e-23 * (Temp + 273.15);
      const gm1_approx   = 2 * Idd_A / (Vdd * 0.15 + 1e-6);
      const Vn_nVrtHz    = Math.max(Math.sqrt(8 * kT / (3 * Math.max(gm1_approx, 1e-5))) * 1e9, 3.0);

      // ── App mode metadata ────────────────────────────────────────────────
      const APPS = [
        { id: 'ldo',           label: 'LDO Regulator',  color: '#16a34a' },
        { id: 'active filter', label: 'Active Filter',  color: '#1d4ed8' },
        { id: 'adc',           label: 'ADC Driver',     color: '#7c3aed' },
        { id: 'dac',           label: 'DAC Output Amp', color: '#0891b2' },
        { id: 'amplifier',     label: 'Amplifier',      color: '#ea580c' },
        { id: 'cascade',       label: 'Multi-Stage',    color: '#be185d' },
      ];
      const acol = (APPS.find(a => a.id === appMode) || APPS[0]).color;

      // ── Helper: Card + Row components ───────────────────────────────────
      function Card({ title, color, children }) {
        return h('div', {
          style: {
            background: '#f8fafc',
            border: `1px solid ${color}33`,
            borderTop: `3px solid ${color}`,
            borderRadius: 10,
            padding: '18px 20px',
            marginBottom: 14,
          }
        },
          h('div', { style: { color, fontSize: 10, letterSpacing: '0.15em', textTransform: 'uppercase', fontFamily: "'IBM Plex Mono',monospace", marginBottom: 14 } }, title),
          children
        );
      }

      function Row({ label, value, unit, note, status }) {
        const statusColor = status === 'ok' ? '#16a34a' : status === 'warn' ? '#d97706' : status === 'bad' ? '#dc2626' : '#047857';
        return h('div', {
          style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '5px 0', borderBottom: '1px solid #e8f4ff' }
        },
          h('div', null,
            h('span', { style: { color: '#4b5563', fontSize: 12 } }, label),
            note && h('span', { style: { color: '#94a3b8', fontSize: 10, marginLeft: 6 } }, `(${note})`)
          ),
          h('span', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: 12, fontWeight: 700, color: statusColor } },
            `${value} ${unit}`)
        );
      }

      function Note({ color, children }) {
        return h('div', {
          style: {
            background: color + '0d',
            border: `1px solid ${color}55`,
            borderLeft: `4px solid ${color}`,
            borderRadius: 6,
            padding: '10px 14px',
            fontSize: 12,
            color: '#1e293b',
            lineHeight: 1.75,
            marginTop: 4,
          }
        }, children);
      }

      function SectionLabel({ text }) {
        return h('div', { style: { color: '#64748b', fontSize: 10, letterSpacing: '0.15em', textTransform: 'uppercase', fontFamily: "'IBM Plex Mono',monospace", marginBottom: 10, marginTop: 6 } }, `── ${text}`);
      }

      // ══════════════════════════════════════════════════════════════════
      // PER-MODE CALCULATIONS
      // ══════════════════════════════════════════════════════════════════

      // ── LDO ──────────────────────────────────────────────────────────
      function calcLDO() {
        const beta       = loadOhm / (loadOhm + 10000);          // R2/(R1+R2), R1=10k
        const T_loop_dB  = AOL_dB + 20 * Math.log10(Math.max(beta, 1e-6));
        const T_loop_lin = Math.pow(10, T_loop_dB / 20);
        const dc_acc_pct = 100 / (1 + T_loop_lin);
        const Zout_OL    = 1000;                                   // Ω typical
        const Zout_CL    = Zout_OL / (1 + T_loop_lin);
        const ripple_rej = T_loop_dB + Math.abs(PSRR_dB);         // combined
        const dropout_headroom_mV = Math.max((Vdd - ICMR_p) * 1000, 0);
        const ldo_bw_kHz = (GBW * beta * 1e-3).toFixed(1);
        return { T_loop_dB, dc_acc_pct, Zout_CL, ripple_rej, dropout_headroom_mV, ldo_bw_kHz, beta };
      }

      // ── ACTIVE FILTER ─────────────────────────────────────────────────
      function calcFilter() {
        // Sallen-Key: fc_max rule: GBW > Q * Av * 2π * fc  → fc_max = GBW/(Q*Av*2π)
        // MFB:        GBW > (Q² * Av * 2π * fc) * k        → fc_max = GBW/(2π*Q²*Av)
        const Av = closedLoopGain;
        let fc_max_Hz, gain_err_pct, phase_err_deg;
        if (filterTopo === 'sallen-key') {
          fc_max_Hz    = GBW / (filterQ * Math.max(Av, 1) * 2 * Math.PI);
          gain_err_pct = (100 * filterQ * Av * 2 * Math.PI * fc_max_Hz / GBW / 5).toFixed(2);
        } else {
          // MFB — more sensitive to finite GBW
          fc_max_Hz    = GBW / (2 * Math.PI * filterQ * filterQ * Math.max(Av, 1));
          gain_err_pct = (100 * filterQ * filterQ * Av * 2 * Math.PI * fc_max_Hz / GBW / 5).toFixed(2);
        }
        const fc_max_kHz = (fc_max_Hz * 1e-3).toFixed(1);
        // Phase error at fc from finite op-amp phase
        phase_err_deg = (Math.atan(fc_max_Hz / GBW) * 180 / Math.PI).toFixed(2);
        // Noise @ filter output: Vn * sqrt(π/2 * fc_max * Av)
        const Vn_out_uV = (Vn_nVrtHz * 1e-9 * Math.sqrt(Math.PI / 2 * fc_max_Hz * Av) * 1e6).toFixed(2);
        // Dynamic range estimate
        const Vout_pk_V  = Math.min(Vpeak, dacFullScaleV / 2);
        const DR_dB      = (20 * Math.log10(Vout_pk_V / Math.max(parseFloat(Vn_out_uV)*1e-6, 1e-9))).toFixed(1);
        return { fc_max_kHz, gain_err_pct, phase_err_deg, Vn_out_uV, DR_dB, fc_max_Hz };
      }

      // ── ADC DRIVER ───────────────────────────────────────────────────
      function calcADC() {
        // Settling to N-bit accuracy: need ln(2^N) = N·ln2 time-constants
        const n_tau      = adcBits * Math.log(2);
        // Unity-gain buffer time constant
        const tau_unity  = 1 / (2 * Math.PI * GBW);
        const t_settle_ns = (n_tau * tau_unity * 1e9).toFixed(1);
        // Slew time for vSwingPct of VDD
        const v_swing    = Vdd * (vSwingPct / 100);
        const t_slew_ns  = (v_swing / SR * 1e9).toFixed(1);
        const t_total_ns = (parseFloat(t_settle_ns) + parseFloat(t_slew_ns)).toFixed(1);
        const fs_max_MSps = (1000 / parseFloat(t_total_ns)).toFixed(2);
        // ENOB degradation from noise: ENOB = (SNR - 1.76) / 6.02
        const Vnoise_V   = Vn_nVrtHz * 1e-9 * Math.sqrt(GBW);
        const SNR_dB     = 20 * Math.log10(Vpeak / Math.max(Vnoise_V, 1e-9));
        const ENOB       = ((SNR_dB - 1.76) / 6.02).toFixed(1);
        // FPBW check
        const fpbw_ok    = FPBW_Hz > GBW / 2;
        // LSB voltage
        const LSB_uV     = ((Vdd / Math.pow(2, adcBits)) * 1e6).toFixed(3);
        return { t_settle_ns, t_slew_ns, t_total_ns, fs_max_MSps, ENOB, LSB_uV, fpbw_ok };
      }

      // ── DAC OUTPUT AMP ───────────────────────────────────────────────
      function calcDAC() {
        const LSB_V        = dacFullScaleV / Math.pow(2, dacBits);
        const LSB_uV       = (LSB_V * 1e6).toFixed(3);
        // Op-amp offset must be << LSB: use 0.5 LSB budget
        const offset_budget_uV = (LSB_V * 0.5 * 1e6).toFixed(1);
        // DC accuracy from loop gain
        const T_lin        = AOL_lin * 1.0; // unity-gain config
        const dc_err_pct   = (100 / (1 + T_lin)).toFixed(5);
        const dc_err_LSB   = (parseFloat(dc_err_pct)/100 * dacFullScaleV / LSB_V).toFixed(2);
        // Settling to DAC accuracy
        const n_tau_dac    = dacBits * Math.log(2);
        const tau_u        = 1 / (2 * Math.PI * GBW);
        const t_settle_dac_ns = (n_tau_dac * tau_u * 1e9).toFixed(1);
        // Glitch energy (slew-rate limited output)
        const t_slew_dac_ns = (dacFullScaleV / SR * 1e9).toFixed(1);
        // SFDR proxy (limited by noise)
        const SFDR_dB      = Math.min(AOL_dB, 6 * dacBits + 1.76).toFixed(1);
        // Noise floor at output
        const Vnoise_dac_uV = (Vn_nVrtHz * 1e-9 * Math.sqrt(GBW / 2) * 1e6).toFixed(2);
        return { LSB_uV, offset_budget_uV, dc_err_pct, dc_err_LSB, t_settle_dac_ns, t_slew_dac_ns, SFDR_dB, Vnoise_dac_uV };
      }

      // ── CLOSED-LOOP AMPLIFIER ─────────────────────────────────────────
      function calcAmplifier() {
        const Av         = closedLoopGain;
        const bw_ninv_Hz = GBW / Av;
        const bw_inv_Hz  = GBW / (Av + 1);
        const FPBW_ok    = FPBW_Hz > bw_ninv_Hz;
        // Gain error
        const gain_err_pct  = (100 * Av / (Av + AOL_lin)).toFixed(5);
        // Output impedance
        const Zout_CL_ohm   = (1000 / (1 + AOL_lin / Av)).toFixed(4);
        // Noise
        const Vn_out_nVrtHz = (Vn_nVrtHz * Math.sqrt(Av * Av + 1) / Av).toFixed(1);
        // Output swing headroom  
        const swing_mV = (Vpeak * 2 * 1000).toFixed(0);
        // Distortion (THD proxy from SR limiting)
        const thd_limited_freq_kHz = (SR / (2 * Math.PI * Vpeak * 1000)).toFixed(1);
        return { bw_ninv_Hz, bw_inv_Hz, gain_err_pct, Zout_CL_ohm, Vn_out_nVrtHz, swing_mV, thd_limited_freq_kHz, FPBW_ok };
      }

      // ── MULTI-STAGE CASCADE ──────────────────────────────────────────
      function calcCascade() {
        const Av         = closedLoopGain;
        const N          = numCascadeStages;
        const total_gain = Math.pow(Av, N);
        const total_dB   = (20 * Math.log10(total_gain)).toFixed(1);
        // −3dB BW shrinkage: BW_n = BW_1 * sqrt(2^(1/N) - 1)
        const bw_shrink  = Math.sqrt(Math.pow(2, 1/N) - 1);
        const cascade_bw_Hz = GBW / Av * bw_shrink;
        // Friis noise: Vn_total² = Vn1² + Vn2²/Av1² + ...
        let noise_sum_sq = 0;
        let gain_so_far  = 1;
        for (let i = 0; i < N; i++) {
          noise_sum_sq += (Vn_nVrtHz / gain_so_far) ** 2;
          gain_so_far  *= Av;
        }
        const Vn_cascade = Math.sqrt(noise_sum_sq).toFixed(1);
        const total_power_uW = (Pow_W * 1e6 * N).toFixed(1);
        // Phase margin degrades: each stage adds phase, use PM_total = PM - (N-1)*15 approx
        const PM_cascade_approx = Math.max(PM_deg - (N - 1) * 12, 5).toFixed(1);
        // Settling: roughly N * Ts for series stages
        const ts_cascade_ns = (Ts_s * 1e9 * N).toFixed(0);
        return { total_gain, total_dB, cascade_bw_Hz, Vn_cascade, total_power_uW, PM_cascade_approx, ts_cascade_ns, bw_shrink };
      }

                `If fc must be higher, increase GBW by widening Wd or Wst, or reduce Cc.`
              )
            ),

            // ── ADC Driver Results ─────────────────────────────────
            appMode === 'adc' && h('div', null,
              h(Card, { title: 'Op-Amp Intrinsics @ Operating Point', color: acol },
                h(Row, { label: 'GBW (unity gain BW)', value: GBW_MHz, unit: 'MHz' }),
                h(Row, { label: 'Slew rate', value: (SR * 1e-6).toFixed(2), unit: 'V/µs' }),
                h(Row, { label: 'FPBW (large-signal)', value: FPBW_MHz_str, unit: 'MHz' }),
                h(Row, { label: 'Settling time (to spec)', value: (Ts_s * 1e9).toFixed(1), unit: 'ns' }),
                h(Row, { label: 'Input noise', value: Vn_nVrtHz.toFixed(1), unit: 'nV/√Hz' }),
              ),
              h(Card, { title: `${adcBits}-Bit SAR ADC Driver — ${vSwingPct}% VDD Swing`, color: acol },
                h(Row, { label: 'LSB voltage', value: adc.LSB_uV, unit: 'µV', note: `VDD/${Math.pow(2,adcBits).toFixed(0)}` }),
                h(Row, { label: 'Required time constants', value: (adcBits * Math.log(2)).toFixed(2), unit: 'τ', note: 'N×ln2' }),
                h(Row, { label: 'Small-signal settling time', value: adc.t_settle_ns, unit: 'ns', status: 'ok' }),
                h(Row, { label: `Slew time (${vSwingPct}% of ${Vdd.toFixed(2)}V)`, value: adc.t_slew_ns, unit: 'ns', status: parseFloat(adc.t_slew_ns) < parseFloat(adc.t_settle_ns) ? 'ok' : 'warn' }),
                h(Row, { label: 'Total acquisition time', value: adc.t_total_ns, unit: 'ns', status: 'ok' }),
                h(Row, { label: 'Maximum sample rate fs', value: adc.fs_max_MSps, unit: 'MSps', status: parseFloat(adc.fs_max_MSps) > 1 ? 'ok' : 'warn' }),
                h(Row, { label: 'ENOB (noise-limited)', value: adc.ENOB, unit: 'bits', status: parseFloat(adc.ENOB) >= adcBits - 1 ? 'ok' : 'warn' }),
                h(Row, { label: 'FPBW ≥ signal BW check', value: adc.fpbw_ok ? '✓ PASS' : '✗ FAIL', unit: '', status: adc.fpbw_ok ? 'ok' : 'bad' }),
              ),
              h(Note, { color: acol },
                h('b', null, '📊 ADC Designer Note: '),
                `For ${adcBits}-bit SAR: settle = ${adc.t_settle_ns} ns + slew = ${adc.t_slew_ns} ns = ${adc.t_total_ns} ns total → max fs = ${adc.fs_max_MSps} MSps. `,
                `ENOB = ${adc.ENOB} bits (noise-limited). `,
                parseFloat(adc.t_slew_ns) > parseFloat(adc.t_settle_ns)
                  ? `Slew-rate dominates — increase Ws or reduce Cc to improve SR. `
                  : `Settling dominates — increase GBW via Wd↑ or Wst↑. `,
                `LSB = ${adc.LSB_uV} µV; input noise floor = ${Vn_nVrtHz.toFixed(1)} nV/√Hz.`
              )
            ),

            // ── DAC Output Amp Results ─────────────────────────────
            appMode === 'dac' && h('div', null,
              h(Card, { title: 'Op-Amp Intrinsics @ Operating Point', color: acol },
                h(Row, { label: 'AOL', value: AOL_dB.toFixed(1), unit: 'dB' }),
                h(Row, { label: 'GBW', value: GBW_MHz, unit: 'MHz' }),
                h(Row, { label: 'Slew rate', value: (SR * 1e-6).toFixed(2), unit: 'V/µs' }),
                h(Row, { label: 'PSRR', value: Math.abs(PSRR_dB).toFixed(1), unit: 'dB' }),
              ),
              h(Card, { title: `${dacBits}-Bit DAC Output Buffer — Vfs = ${dacFullScaleV.toFixed(2)} V`, color: acol },
                h(Row, { label: 'LSB voltage', value: dac.LSB_uV, unit: 'µV', note: `Vfs / ${Math.pow(2,dacBits).toFixed(0)}` }),
                h(Row, { label: 'Offset error budget (0.5 LSB)', value: dac.offset_budget_uV, unit: 'µV' }),
                h(Row, { label: 'DC gain error', value: dac.dc_err_pct, unit: '%', status: 'ok' }),
                h(Row, { label: 'DC gain error in LSBs', value: dac.dc_err_LSB, unit: 'LSB', status: parseFloat(dac.dc_err_LSB) < 0.5 ? 'ok' : 'warn' }),
                h(Row, { label: 'Settling time (to DAC accuracy)', value: dac.t_settle_dac_ns, unit: 'ns' }),
                h(Row, { label: 'Slew time (full-scale step)', value: dac.t_slew_dac_ns, unit: 'ns', status: parseFloat(dac.t_slew_dac_ns) < 200 ? 'ok' : 'warn' }),
                h(Row, { label: 'SFDR proxy', value: dac.SFDR_dB, unit: 'dB', status: parseFloat(dac.SFDR_dB) > 6*dacBits ? 'ok' : 'warn' }),
                h(Row, { label: 'Output noise floor', value: dac.Vnoise_dac_uV, unit: 'µV rms' }),
              ),
              h(Note, { color: acol },
                h('b', null, '🔊 DAC Designer Note: '),
                `LSB = ${dac.LSB_uV} µV. DC gain error = ${dac.dc_err_LSB} LSBs — ${parseFloat(dac.dc_err_LSB) < 0.5 ? 'well within 0.5 LSB budget ✓' : 'EXCEEDS 0.5 LSB — increase AOL or use autozero technique'}. `,
                `Full-scale slew time = ${dac.t_slew_dac_ns} ns. Output noise = ${dac.Vnoise_dac_uV} µV rms — `,
                parseFloat(dac.Vnoise_dac_uV)*1e-6 < parseFloat(dac.LSB_uV)*1e-6 ? 'noise below 1 LSB ✓.' : 'noise exceeds 1 LSB — consider reducing GBW (Cc↑) to limit noise BW.'
              )
            ),

            // ── Amplifier Results ──────────────────────────────────
            appMode === 'amplifier' && h('div', null,
              h(Card, { title: 'Op-Amp Intrinsics @ Operating Point', color: acol },
                h(Row, { label: 'AOL', value: AOL_dB.toFixed(1), unit: 'dB' }),
                h(Row, { label: 'GBW', value: GBW_MHz, unit: 'MHz' }),
                h(Row, { label: 'Phase margin', value: PM_deg.toFixed(1), unit: '°', status: PM_deg > 60 ? 'ok' : 'warn' }),
                h(Row, { label: 'Slew rate', value: (SR * 1e-6).toFixed(2), unit: 'V/µs' }),
                h(Row, { label: 'Input noise', value: Vn_nVrtHz.toFixed(1), unit: 'nV/√Hz' }),
              ),
              h(Card, { title: `Closed-Loop Amplifier — Av = ${closedLoopGain}× (${(20*Math.log10(closedLoopGain)).toFixed(1)} dB)`, color: acol },
                h(Row, { label: 'BW (non-inverting config)', value: (amp.bw_ninv_Hz * 1e-6).toFixed(3), unit: 'MHz', status: 'ok' }),
                h(Row, { label: 'BW (inverting config)', value: (amp.bw_inv_Hz * 1e-6).toFixed(3), unit: 'MHz', note: `noise gain=${closedLoopGain+1}` }),
                h(Row, { label: 'Gain error', value: amp.gain_err_pct, unit: '%', status: parseFloat(amp.gain_err_pct) < 0.01 ? 'ok' : 'warn' }),
                h(Row, { label: 'Closed-loop output impedance', value: amp.Zout_CL_ohm, unit: 'Ω', status: 'ok' }),
                h(Row, { label: 'Output noise (referred to out)', value: amp.Vn_out_nVrtHz, unit: 'nV/√Hz' }),
                h(Row, { label: 'Peak output swing', value: amp.swing_mV, unit: 'mV pp' }),
                h(Row, { label: 'THD-limited frequency (SR)', value: amp.thd_limited_freq_kHz, unit: 'kHz', note: 'above this → distortion', status: parseFloat(amp.thd_limited_freq_kHz) > 500 ? 'ok' : 'warn' }),
                h(Row, { label: 'FPBW (large signal)', value: FPBW_MHz_str, unit: 'MHz' }),
                h(Row, { label: 'FPBW ≥ CL BW check', value: amp.FPBW_ok ? '✓ PASS' : '✗ FAIL', unit: '', status: amp.FPBW_ok ? 'ok' : 'bad' }),
              ),
              h(Note, { color: acol },
                h('b', null, '📣 Amplifier Designer Note: '),
                `At Av=${closedLoopGain}×: CL bandwidth = ${(amp.bw_ninv_Hz*1e-6).toFixed(3)} MHz (non-inv.) / ${(amp.bw_inv_Hz*1e-6).toFixed(3)} MHz (inv.). `,
                `Gain error = ${amp.gain_err_pct}%. `,
                `SR-limited THD floor starts at ${amp.thd_limited_freq_kHz} kHz — above this frequency, slew-rate distortion dominates. `,
                `${!amp.FPBW_ok ? 'WARNING: FPBW < CL BW — output will clip on large signals. Increase SR via Ws↑ or Cc↓.' : 'FPBW > CL BW ✓ — SR not limiting.'}`
              )
            ),

            // ── Multi-Stage Cascade Results ────────────────────────
            appMode === 'cascade' && h('div', null,
              h(Card, { title: 'Per-Stage Op-Amp @ Operating Point', color: acol },
                h(Row, { label: 'AOL per stage', value: AOL_dB.toFixed(1), unit: 'dB' }),
                h(Row, { label: 'GBW per stage', value: GBW_MHz, unit: 'MHz' }),
                h(Row, { label: 'Phase margin per stage', value: PM_deg.toFixed(1), unit: '°', status: PM_deg > 60 ? 'ok' : 'warn' }),
                h(Row, { label: 'Power per stage', value: (Pow_W * 1e6).toFixed(1), unit: 'µW' }),
                h(Row, { label: 'Input noise per stage', value: Vn_nVrtHz.toFixed(1), unit: 'nV/√Hz' }),
              ),
              h(Card, { title: `${numCascadeStages}-Stage Cascade — Av = ${closedLoopGain}× / stage`, color: acol },
                h(Row, { label: 'Total gain', value: cas.total_dB, unit: 'dB', note: `${cas.total_gain.toFixed(0)}×`, status: 'ok' }),
                h(Row, { label: 'Cascade −3dB bandwidth', value: (cas.cascade_bw_Hz * 1e-6).toFixed(3), unit: 'MHz', note: `BW₁×${cas.bw_shrink.toFixed(3)}` }),
                h(Row, { label: 'Input noise (Friis)', value: cas.Vn_cascade, unit: 'nV/√Hz', status: parseFloat(cas.Vn_cascade) < Vn_nVrtHz * 1.5 ? 'ok' : 'warn' }),
                h(Row, { label: 'Approx. cascade phase margin', value: cas.PM_cascade_approx, unit: '°', status: parseFloat(cas.PM_cascade_approx) > 45 ? 'ok' : 'bad' }),
                h(Row, { label: 'Cascade settling time (≈ N×Ts)', value: cas.ts_cascade_ns, unit: 'ns' }),
                h(Row, { label: 'Total power consumption', value: cas.total_power_uW, unit: 'µW', status: parseFloat(cas.total_power_uW) < 500 ? 'ok' : 'warn' }),
              ),
              h(Note, { color: acol },
                h('b', null, '🔗 Cascade Designer Note: '),
                `${numCascadeStages} stages × ${closedLoopGain}× = ${cas.total_gain.toFixed(0)}× total (${cas.total_dB} dB). `,
                `Cascade −3dB BW = ${(cas.cascade_bw_Hz*1e-6).toFixed(3)} MHz (BW shrinkage factor ${cas.bw_shrink.toFixed(3)} from stage pole interaction). `,
                `Friis input noise = ${cas.Vn_cascade} nV/√Hz — `,
                parseFloat(cas.Vn_cascade) < Vn_nVrtHz * 1.05 ? 'first stage dominates noise (good) ✓.' : 'noise increases due to low first-stage gain — increase Av/stage or add input LNA.',
                ` Phase margin degrades ~12°/stage — `,
                parseFloat(cas.PM_cascade_approx) < 45 ? `WARNING: cascade PM = ${cas.PM_cascade_approx}° — compensate or reduce stages.` : `cascade PM ≈ ${cas.PM_cascade_approx}° ✓.`
              )
            )
          )
        )
      );
    }

          @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700;800&display=swap');
          input[type=range] { height: 4px; }
          @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
          ::-webkit-scrollbar { width: 6px; }
          ::-webkit-scrollbar-track { background: #ffffff; }
          ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 3px; }
        `)
      );
    }

    createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
